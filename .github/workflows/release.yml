name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create release + upload assets
  id-token: write   # OIDC federation for azure/login@v2

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: |
          set -euxo pipefail
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
          cmake --build build -j
          strip build/aas-sign
          mv build/aas-sign aas-sign-linux-x86_64
      - uses: actions/upload-artifact@v5
        with:
          name: linux
          path: aas-sign-linux-x86_64

  build-windows:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build
        run: |
          set -euxo pipefail
          cmake -B build-mingw \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=cmake/x86_64-w64-mingw32.cmake
          cmake --build build-mingw -j
          x86_64-w64-mingw32-strip build-mingw/aas-sign.exe
          mv build-mingw/aas-sign.exe aas-sign-windows-x86_64.exe
      - uses: actions/upload-artifact@v5
        with:
          name: windows
          path: aas-sign-windows-x86_64.exe

  sign-and-release:
    runs-on: ubuntu-24.04
    needs: [build-linux, build-windows]
    environment: release
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: linux
          path: .
      - uses: actions/download-artifact@v5
        with:
          name: windows
          path: .
      - name: Make linux binary executable
        run: chmod +x aas-sign-linux-x86_64

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Self-sign Windows binary
        env:
          ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          ACCOUNT:  ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          PROFILE:  ${{ secrets.CERTIFICATE_PROFILE }}
        run: |
          set -euo pipefail
          token="$(az account get-access-token \
                    --resource https://codesigning.azure.net \
                    --query accessToken -o tsv)"
          echo "::add-mask::${token}"
          ./aas-sign-linux-x86_64 \
            --endpoint "${ENDPOINT}" \
            --account  "${ACCOUNT}" \
            --profile  "${PROFILE}" \
            --token    "${token}" \
            aas-sign-windows-x86_64.exe

      - name: Compute checksums
        run: |
          set -euo pipefail
          sha256sum aas-sign-linux-x86_64 aas-sign-windows-x86_64.exe \
            > sha256sums.txt
          cat sha256sums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            aas-sign-linux-x86_64 \
            aas-sign-windows-x86_64.exe \
            sha256sums.txt
